name: Build, Release & Publish Kemforge

on:
  push:
    branches:
      - "main"
      - "feature/**"
      - "feat/**"
      - "dependabot/**"
      - "copilot/**"
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build-release-publish:
    runs-on: macos-latest
    if: "!contains(github.event.head_commit.message, '[test brew]')"

    steps:
      - name: Checkout homebrew-kemforge
        uses: actions/checkout@v5

      - name: Clone kemforge source
        run: git clone https://github.com/ConnectingApps/kemforge.git kemforge-src

      - name: Fetch tags and determine version
        id: version
        working-directory: kemforge-src
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          VERSION="${LATEST_TAG#v}"
          echo "LATEST_TAG=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST_TAG"
          echo "Version: $VERSION"
          git checkout "$LATEST_TAG"

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: kemforge-src/go.sum

      - name: Build static binaries
        working-directory: kemforge-src
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -o kemforge-darwin-amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o kemforge-darwin-arm64 .

      - name: Create tar.gz archives
        working-directory: kemforge-src
        run: |
          tar czf kemforge-darwin-amd64.tar.gz kemforge-darwin-amd64
          tar czf kemforge-darwin-arm64.tar.gz kemforge-darwin-arm64

      - name: Compute SHA256 checksums
        id: checksums
        working-directory: kemforge-src
        run: |
          SHA256_AMD64=$(shasum -a 256 kemforge-darwin-amd64.tar.gz | awk '{print $1}')
          SHA256_ARM64=$(shasum -a 256 kemforge-darwin-arm64.tar.gz | awk '{print $1}')
          echo "SHA256_AMD64=$SHA256_AMD64" >> "$GITHUB_OUTPUT"
          echo "SHA256_ARM64=$SHA256_ARM64" >> "$GITHUB_OUTPUT"
          echo "SHA256 amd64: $SHA256_AMD64"
          echo "SHA256 arm64: $SHA256_ARM64"

      - name: Create GitHub Release and upload assets
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.LATEST_TAG }}
          name: ${{ steps.version.outputs.LATEST_TAG }}
          body: "Kemforge ${{ steps.version.outputs.LATEST_TAG }}"
          files: |
            kemforge-src/kemforge-darwin-amd64.tar.gz
            kemforge-src/kemforge-darwin-arm64.tar.gz

      - name: Set release URLs
        id: urls
        run: |
          LATEST_TAG="${{ steps.version.outputs.LATEST_TAG }}"
          RELEASE_URL_AMD64="https://github.com/${{ github.repository }}/releases/download/${LATEST_TAG}/kemforge-darwin-amd64.tar.gz"
          RELEASE_URL_ARM64="https://github.com/${{ github.repository }}/releases/download/${LATEST_TAG}/kemforge-darwin-arm64.tar.gz"
          echo "RELEASE_URL_AMD64=$RELEASE_URL_AMD64" >> "$GITHUB_OUTPUT"
          echo "RELEASE_URL_ARM64=$RELEASE_URL_ARM64" >> "$GITHUB_OUTPUT"
          echo "Asset URL (amd64): $RELEASE_URL_AMD64"
          echo "Asset URL (arm64): $RELEASE_URL_ARM64"

      - name: Create/update Homebrew formula
        run: |
          mkdir -p Formula
          cat > Formula/kemforge.rb <<'EOF'
          class Kemforge < Formula
            desc "Kemforge CLI"
            homepage "https://github.com/ConnectingApps/kemforge"
            version "${{ steps.version.outputs.VERSION }}"

            if OS.mac? && Hardware::CPU.intel?
              url "${{ steps.urls.outputs.RELEASE_URL_AMD64 }}"
              sha256 "${{ steps.checksums.outputs.SHA256_AMD64 }}"
            end

            if OS.mac? && Hardware::CPU.arm?
              url "${{ steps.urls.outputs.RELEASE_URL_ARM64 }}"
              sha256 "${{ steps.checksums.outputs.SHA256_ARM64 }}"
            end

            def install
              bin.install "kemforge-darwin-#{Hardware::CPU.arch}" => "kemforge"
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kemforge.rb
          git commit -m "Update kemforge formula to ${{ steps.version.outputs.LATEST_TAG }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Tap and install kemforge via Homebrew
        run: |
          brew tap ConnectingApps/kemforge
          brew install kemforge

      - name: Test kemforge CLI
        run: |
          kemforge --help
          kemforge -I https://www.google.com

  test-brew-only:
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, '[test brew]')

    steps:
      - name: Tap and install kemforge via Homebrew
        run: |
          brew tap ConnectingApps/kemforge
          brew install kemforge

      - name: Test kemforge CLI
        run: |
          kemforge --version
          kemforge --help
          kemforge -I https://www.google.com
          
  create-homebrew-core-source-artifacts:
    runs-on: ubuntu-latest
    outputs:
      LATEST_TAG: ${{ steps.version.outputs.LATEST_TAG }}
      VERSION: ${{ steps.version.outputs.VERSION }}
      SHA256: ${{ steps.sha.outputs.SHA256 }}

    steps:
      - name: Clone kemforge source
        run: |
          set -euo pipefail
          git clone https://github.com/ConnectingApps/kemforge.git kemforge-src

      - name: Fetch tags and determine version
        id: version
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          VERSION="${LATEST_TAG#v}"
          echo "LATEST_TAG=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST_TAG"
          echo "Version: $VERSION"
          git checkout "$LATEST_TAG"

      - name: Set up Go 1.26
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: kemforge-src/go.sum

      - name: Create deterministic source tarball
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          LATEST_TAG="${{ steps.version.outputs.LATEST_TAG }}"
          git archive --format=tar --prefix="kemforge-${VERSION}/" "${LATEST_TAG}" | gzip -n > "kemforge-${VERSION}.tar.gz"
          echo "Created kemforge-${VERSION}.tar.gz"
          ls -la "kemforge-${VERSION}.tar.gz"

      - name: Compute SHA-256 checksum
        id: sha
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256=$(sha256sum "kemforge-${VERSION}.tar.gz" | awk '{print $1}')
          echo "SHA256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "SHA-256: ${SHA256}"

      - name: Validate source tarball
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARBALL="kemforge-${VERSION}.tar.gz"
          SUMMARY="VALIDATION-SUMMARY.txt"
          EXTRACT_DIR=$(mktemp -d)

          echo "=== Job 1: Source Tarball Validation ===" > "${SUMMARY}"
          echo "" >> "${SUMMARY}"

          tar xzf "${TARBALL}" -C "${EXTRACT_DIR}"
          echo "PASS: extraction succeeded" >> "${SUMMARY}"

          ROOT="${EXTRACT_DIR}/kemforge-${VERSION}"

          if [ -d "${ROOT}" ]; then
            echo "PASS: top-level directory is kemforge-${VERSION}/" >> "${SUMMARY}"
          else
            echo "FAIL: top-level directory kemforge-${VERSION}/ not found" >> "${SUMMARY}"
            exit 1
          fi

          if [ -f "${ROOT}/go.mod" ]; then
            echo "PASS: go.mod exists" >> "${SUMMARY}"
          else
            echo "FAIL: go.mod not found" >> "${SUMMARY}"
            exit 1
          fi

          if [ -f "${ROOT}/go.sum" ]; then
            echo "PASS: go.sum exists" >> "${SUMMARY}"
          else
            echo "FAIL: go.sum not found" >> "${SUMMARY}"
            exit 1
          fi

          if [ -f "${ROOT}/LICENSE" ] || [ -f "${ROOT}/LICENSE.txt" ] || [ -f "${ROOT}/COPYING" ]; then
            echo "PASS: license file exists" >> "${SUMMARY}"
          else
            echo "FAIL: no license file found (LICENSE, LICENSE.txt, or COPYING)" >> "${SUMMARY}"
            exit 1
          fi

          BINARIES_FOUND=false
          while IFS= read -r -d '' f; do
            FILE_TYPE=$(file -b "$f")
            if [[ "$f" == *.exe ]] || echo "${FILE_TYPE}" | grep -qiE 'ELF|Mach-O|PE32|MS-DOS'; then
              echo "FAIL: compiled binary found: $f (${FILE_TYPE})" >> "${SUMMARY}"
              BINARIES_FOUND=true
            fi
          done < <(find "${ROOT}" -type f -print0)

          if [ "${BINARIES_FOUND}" = false ]; then
            echo "PASS: no compiled binaries found" >> "${SUMMARY}"
          else
            exit 1
          fi

          echo "" >> "${SUMMARY}"
          echo "All Job 1 tarball validation checks passed." >> "${SUMMARY}"
          cat "${SUMMARY}"
          rm -rf "${EXTRACT_DIR}"

      - name: Generate Homebrew Core formula
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"
          cat > kemforge.rb <<FORMULA
          class Kemforge < Formula
            desc "Kemforge CLI"
            homepage "https://github.com/ConnectingApps/kemforge"
            url "__LOCAL_SOURCE_TARBALL_URL__"
            sha256 "${SHA256}"
            license "GPL-3.0-only"
            version "${VERSION}"

            depends_on "go" => :build

            def install
              system "go", "build", *std_go_args, "."
            end

            test do
              system bin/"kemforge", "--version"
              system bin/"kemforge", "--help"
            end
          end
          FORMULA
          echo "Generated kemforge.rb:"
          cat kemforge.rb

      - name: Create PR-ready directory structure
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          mkdir -p pr-ready-homebrew-core/Formula/k
          cp kemforge.rb pr-ready-homebrew-core/Formula/k/kemforge.rb

      - name: Generate PR handoff document
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA256="${{ steps.sha.outputs.SHA256 }}"
          cat > PR-HANDOFF.txt <<HANDOFF
          Homebrew Core PR Handoff — kemforge
          ======================================

          Formula name:      kemforge
          Version:           ${VERSION}
          Source tarball:     kemforge-${VERSION}.tar.gz
          SHA-256:           ${SHA256}
          Target path:       Formula/k/kemforge.rb
          Suggested branch:  kemforge-${VERSION}
          Suggested commit:  kemforge ${VERSION} (new formula)

          Before opening the PR, replace the placeholder url
          "__LOCAL_SOURCE_TARBALL_URL__" in the formula with the actual
          URL where the source tarball will be hosted. Once the real URL
          contains the version string, the explicit "version" field in the
          formula may be removed.

          Manual steps:
            1. Clone your fork of Homebrew/homebrew-core
            2. Copy pr-ready-homebrew-core/Formula/k/kemforge.rb into Formula/k/kemforge.rb
            3. Run: brew audit --strict --new --online ./Formula/k/kemforge.rb
            4. Run: HOMEBREW_NO_INSTALL_FROM_API=1 brew install --build-from-source ./Formula/k/kemforge.rb
            5. Run: brew test kemforge
            6. Commit and push branch
            7. Open PR to Homebrew/homebrew-core
          HANDOFF
          echo "Generated PR-HANDOFF.txt:"
          cat PR-HANDOFF.txt

      - name: Generate metadata file
        working-directory: kemforge-src
        run: |
          set -euo pipefail
          cat > metadata.txt <<META
          LATEST_TAG=${{ steps.version.outputs.LATEST_TAG }}
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA256=${{ steps.sha.outputs.SHA256 }}
          META

      - name: Stage artifacts
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p staging/pr-ready-homebrew-core/Formula/k
          cp "kemforge-src/kemforge-${VERSION}.tar.gz" staging/
          cp kemforge-src/kemforge.rb staging/
          cp kemforge-src/kemforge.rb staging/pr-ready-homebrew-core/Formula/k/kemforge.rb
          cp kemforge-src/PR-HANDOFF.txt staging/
          cp kemforge-src/VALIDATION-SUMMARY.txt staging/
          cp kemforge-src/metadata.txt staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-core-prep
          path: staging/

  validate-homebrew-core-macos:
    needs: create-homebrew-core-source-artifacts
    runs-on: macos-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: homebrew-core-prep
          path: prep

      - name: Read metadata
        id: meta
        run: |
          set -euo pipefail
          cat prep/metadata.txt >> "$GITHUB_OUTPUT"

      - name: Verify tarball SHA-256
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.VERSION }}"
          EXPECTED="${{ steps.meta.outputs.SHA256 }}"
          ACTUAL=$(shasum -a 256 "prep/kemforge-${VERSION}.tar.gz" | awk '{print $1}')
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          echo "" >> "${SUMMARY}"
          echo "=== Job 2: macOS Validation ===" >> "${SUMMARY}"
          echo "" >> "${SUMMARY}"
          if [ "${ACTUAL}" = "${EXPECTED}" ]; then
            echo "PASS: SHA-256 verified (${ACTUAL})" >> "${SUMMARY}"
          else
            echo "FAIL: SHA-256 mismatch (expected ${EXPECTED}, got ${ACTUAL})" >> "${SUMMARY}"
            exit 1
          fi

      - name: Verify tarball root folder
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.VERSION }}"
          EXTRACT_DIR=$(mktemp -d)
          tar xzf "prep/kemforge-${VERSION}.tar.gz" -C "${EXTRACT_DIR}"
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if [ -d "${EXTRACT_DIR}/kemforge-${VERSION}" ]; then
            echo "PASS: root folder is kemforge-${VERSION}/" >> "${SUMMARY}"
          else
            echo "FAIL: root folder kemforge-${VERSION}/ not found" >> "${SUMMARY}"
            exit 1
          fi
          rm -rf "${EXTRACT_DIR}"

      - name: Patch formula URL for local validation
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.VERSION }}"
          TARBALL_PATH="$(cd prep && pwd)/kemforge-${VERSION}.tar.gz"
          sed -i '' "s|__LOCAL_SOURCE_TARBALL_URL__|file://${TARBALL_PATH}|g" prep/kemforge.rb
          echo "Patched formula:"
          cat prep/kemforge.rb

      - name: Run brew audit
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if brew audit --strict --new --online prep/kemforge.rb; then
            echo "PASS: brew audit passed" >> "${SUMMARY}"
          else
            echo "FAIL: brew audit failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Install from source with Homebrew
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if HOMEBREW_NO_INSTALL_FROM_API=1 brew install --build-from-source prep/kemforge.rb; then
            echo "PASS: brew install --build-from-source succeeded" >> "${SUMMARY}"
          else
            echo "FAIL: brew install --build-from-source failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Run brew test
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if brew test kemforge; then
            echo "PASS: brew test passed" >> "${SUMMARY}"
          else
            echo "FAIL: brew test failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Test kemforge --version
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if kemforge --version; then
            echo "PASS: kemforge --version succeeded" >> "${SUMMARY}"
          else
            echo "FAIL: kemforge --version failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Test kemforge --help
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if kemforge --help; then
            echo "PASS: kemforge --help succeeded" >> "${SUMMARY}"
          else
            echo "FAIL: kemforge --help failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-macos
          path: prep/VALIDATION-SUMMARY.txt

  validate-homebrew-core-linux:
    needs: create-homebrew-core-source-artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Install Homebrew on Linux
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential procps curl file git
          NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/sbin" >> "$GITHUB_PATH"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: homebrew-core-prep
          path: prep

      - name: Read metadata
        id: meta
        run: |
          set -euo pipefail
          cat prep/metadata.txt >> "$GITHUB_OUTPUT"

      - name: Verify tarball SHA-256
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.VERSION }}"
          EXPECTED="${{ steps.meta.outputs.SHA256 }}"
          ACTUAL=$(sha256sum "prep/kemforge-${VERSION}.tar.gz" | awk '{print $1}')
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          echo "" >> "${SUMMARY}"
          echo "=== Job 3: Linux Validation ===" >> "${SUMMARY}"
          echo "" >> "${SUMMARY}"
          if [ "${ACTUAL}" = "${EXPECTED}" ]; then
            echo "PASS: SHA-256 verified (${ACTUAL})" >> "${SUMMARY}"
          else
            echo "FAIL: SHA-256 mismatch (expected ${EXPECTED}, got ${ACTUAL})" >> "${SUMMARY}"
            exit 1
          fi

      - name: Verify tarball root folder
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.VERSION }}"
          EXTRACT_DIR=$(mktemp -d)
          tar xzf "prep/kemforge-${VERSION}.tar.gz" -C "${EXTRACT_DIR}"
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if [ -d "${EXTRACT_DIR}/kemforge-${VERSION}" ]; then
            echo "PASS: root folder is kemforge-${VERSION}/" >> "${SUMMARY}"
          else
            echo "FAIL: root folder kemforge-${VERSION}/ not found" >> "${SUMMARY}"
            exit 1
          fi
          rm -rf "${EXTRACT_DIR}"

      - name: Patch formula URL for local validation
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.VERSION }}"
          TARBALL_PATH="$(cd prep && pwd)/kemforge-${VERSION}.tar.gz"
          sed -i "s|__LOCAL_SOURCE_TARBALL_URL__|file://${TARBALL_PATH}|g" prep/kemforge.rb
          echo "Patched formula:"
          cat prep/kemforge.rb

      - name: Run brew audit
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if brew audit --strict --new --online prep/kemforge.rb; then
            echo "PASS: brew audit passed" >> "${SUMMARY}"
          else
            echo "FAIL: brew audit failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Install from source with Homebrew
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if HOMEBREW_NO_INSTALL_FROM_API=1 brew install --build-from-source prep/kemforge.rb; then
            echo "PASS: brew install --build-from-source succeeded" >> "${SUMMARY}"
          else
            echo "FAIL: brew install --build-from-source failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Run brew test
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if brew test kemforge; then
            echo "PASS: brew test passed" >> "${SUMMARY}"
          else
            echo "FAIL: brew test failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Test kemforge --version
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if kemforge --version; then
            echo "PASS: kemforge --version succeeded" >> "${SUMMARY}"
          else
            echo "FAIL: kemforge --version failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Test kemforge --help
        run: |
          set -euo pipefail
          SUMMARY="prep/VALIDATION-SUMMARY.txt"
          if kemforge --help; then
            echo "PASS: kemforge --help succeeded" >> "${SUMMARY}"
          else
            echo "FAIL: kemforge --help failed" >> "${SUMMARY}"
            exit 1
          fi

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-linux
          path: prep/VALIDATION-SUMMARY.txt
